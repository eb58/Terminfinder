<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terminfinder</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div class="brand">
          <img class="logo" src="https://senioren-luebars.berlin/wp-content/uploads/2021/08/Wappen-Reinickendorf-gross-e1771689518202-436x68.jpg" alt="Freizeitst&auml;tte L&uuml;bars">
          <div>
            <h1>Terminfinder</h1>
            <p id="eyebrow" class="eyebrow">Termin abstimmen</p>
          </div>
        </div>
        <button id="resetButton" class="ghost-button admin-only" type="button">Zur&uuml;cksetzen</button>
      </section>

      <section class="panel" id="invitePanel">
        <h2 class="admin-only">Einladung</h2>
        <textarea id="inviteInput" class="invite-input admin-only" rows="3" placeholder="Kurze Einladung an die Teilnehmer, z. B. worum es geht und bis wann abgestimmt werden soll."></textarea>
        <p id="inviteText" class="invite-text"></p>
      </section>

      <section class="panel admin-only">
        <div class="panel-head">
          <div>
            <h2>Termine</h2>
            <p class="admin-only">Datum bearbeiten oder weitere Vorschl&auml;ge hinzuf&uuml;gen.</p>
          </div>
          <form id="slotForm" class="slot-form admin-only">
            <input id="slotDate" type="date" aria-label="Datum">
            <input id="slotTime" type="time" aria-label="Uhrzeit">
            <label class="toggle">
              <input id="timeMode" type="checkbox" checked>
              <span>mit Uhrzeit</span>
            </label>
            <button type="submit">Hinzuf&uuml;gen</button>
          </form>
        </div>
        <div id="slotList" class="slot-list" aria-label="Termine"></div>
      </section>

      <section class="panel admin-only">
        <div class="panel-head">
          <div>
            <h2>Teilnehmer</h2>
            <p class="admin-only">W&auml;hle aus, wer an welchem Termin kann. Mehrere Namen kannst du komma-separiert einf&uuml;gen.</p>
          </div>
          <form id="personForm" class="person-form admin-only">
            <input id="personInput" type="text" placeholder="Name" autocomplete="off" aria-label="Name">
            <button type="submit">Hinzuf&uuml;gen</button>
          </form>
        </div>
        <div id="personList" class="person-list" aria-label="Teilnehmer"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>Verf&uuml;gbarkeiten</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table id="availabilityTable" class="availability-table"></table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>Beste Termine</h2>
            <p>Sortiert nach Anzahl verf&uuml;gbarer Personen.</p>
          </div>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
